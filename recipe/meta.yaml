{% set name = "con-duct" %}
{% set version = "0.19.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/con_duct-{{ version }}.tar.gz
  sha256: 19a3613d395098e2466388d911583de70ed94908eb8d3649f29c1650878dedc8

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 1

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=46.4.0
    - pip
    - versioningit
  run:
    - python >={{ python_min }}
    - __unix  # Constrain to linux and mac
    - matplotlib
    - PyYaml
    - pyout

test:
  imports:
    - con_duct
  commands:
    - python -m pytest -vv test
  requires:
    - python {{ python_min }}
    - pytest
    - pytest-cov
    - pytest-rerunfailures
    - matplotlib
    # ps is needed for tests, macOS provides by default
    - procps-ng  # [linux]
  source_files:
    - test
    - tox.ini

about:
  home: https://github.com/con/duct/
  summary: Runs a command and collects resource usage metrics
  license: MIT
  license_family: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - asmacdo
    - yarikoptic
